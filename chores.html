<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Saturday Chore Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FDF3E7;
    --card:#FFFFFF;
    --ink:#3A2A1E;
    --ink-soft:#8A7663;
    --accent:#E8863A;
    --accent-deep:#C96A22;
    --done:#4FAE85;
    --line:#F0E2D2;
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Nunito',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:16px 14px calc(90px + env(safe-area-inset-bottom));
    max-width:520px;
    margin:0 auto;
  }
  header{display:flex;align-items:center;gap:10px;margin:6px 2px 14px}
  .broom{font-size:34px;line-height:1}
  h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:26px;letter-spacing:.2px}
  header p{font-size:13px;color:var(--ink-soft);font-weight:600}

  .progress-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:0 3px 14px rgba(58,42,30,.07);
    padding:14px 16px;margin-bottom:14px;
  }
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .progress-top .count{font-family:'Baloo 2',cursive;font-weight:800;font-size:20px}
  .progress-top .pct{font-size:13px;font-weight:800;color:var(--accent-deep)}
  .bar{height:12px;background:#F5E9DB;border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#F2A75E);border-radius:99px;transition:width .3s ease;min-width:0}
  .bar-fill.complete{background:var(--done)}
  .all-done{display:none;text-align:center;font-family:'Baloo 2',cursive;font-weight:700;font-size:16px;color:var(--done);margin-top:8px}
  .all-done.show{display:block}

  .chores{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:0 3px 14px rgba(58,42,30,.07);
    overflow:hidden;margin-bottom:14px;
  }
  .chore{
    display:flex;align-items:flex-start;gap:12px;
    padding:14px 16px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
  }
  .chore:last-child{border-bottom:none}
  .box{
    width:26px;height:26px;flex:none;margin-top:1px;
    border:2.5px solid #D9C7B2;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#fff;font-weight:800;
    transition:all .15s;
  }
  .chore.done .box{background:var(--done);border-color:var(--done)}
  .chore .text{flex:1;font-size:15px;font-weight:700;line-height:1.4}
  .chore.done .text{color:var(--ink-soft);text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:#C9B8A4}
  .chore .del{
    flex:none;border:none;background:none;color:#D9C7B2;font-size:16px;
    padding:2px 0 2px 8px;cursor:pointer;margin-top:2px;
  }

  .actions{display:flex;gap:10px}
  button{font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
  .btn{
    border:none;border-radius:14px;font-weight:800;font-size:14px;
    padding:12px 14px;cursor:pointer;transition:transform .08s;
  }
  .btn:active{transform:scale(.96)}
  .btn-add{flex:2;background:var(--ink);color:#fff;font-family:'Baloo 2',cursive;font-weight:700;font-size:15px}
  .btn-reset{flex:1;background:#F5E9DB;color:var(--ink-soft)}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(58,42,30,.45);
    display:none;align-items:flex-end;justify-content:center;z-index:10;
  }
  .overlay.open{display:flex}
  .sheet{
    background:#fff;width:100%;max-width:520px;
    border-radius:24px 24px 0 0;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    animation:up .22s ease-out;
  }
  @keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  @media (prefers-reduced-motion: reduce){.sheet{animation:none}.btn:active{transform:none}}
  .sheet h3{font-family:'Baloo 2',cursive;font-size:20px;margin-bottom:14px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field input{
    width:100%;border:2px solid var(--line);border-radius:12px;
    padding:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--ink);
    outline:none;background:#FFFDF9;
  }
  .field input:focus{border-color:var(--accent)}
  .sheet-btns{display:flex;gap:10px;margin-top:16px}
  .sheet-btns .cancel{flex:1;background:#F5E9DB;color:var(--ink-soft)}
  .sheet-btns .confirm{flex:2;background:var(--ink);color:#fff}
</style>
</head>
<body>

<header>
  <span class="broom">🧹</span>
  <div>
    <h1>Saturday Chore Chart</h1>
    <p>Party prep — tap a chore to check it off</p>
  </div>
</header>

<div class="progress-card">
  <div class="progress-top">
    <span class="count" id="countText">0 of 0 done</span>
    <span class="pct" id="pctText">0%</span>
  </div>
  <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <div class="all-done" id="allDone">🎉 Everything's done — party ready!</div>
</div>

<div class="chores" id="choreList"></div>

<div class="actions">
  <button class="btn btn-add" onclick="openAddSheet()">+ Add chore</button>
  <button class="btn btn-reset" onclick="resetAll()">Uncheck all</button>
</div>

<!-- Add chore sheet -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <h3>Add a chore</h3>
    <div class="field">
      <label>Chore</label>
      <input id="choreText" type="text" placeholder="e.g. Wipe down kitchen counters" autocomplete="off">
    </div>
    <div class="sheet-btns">
      <button class="btn cancel" onclick="closeSheets()">Cancel</button>
      <button class="btn confirm" onclick="saveChore()">Add it</button>
    </div>
  </div>
</div>

<script>
/* ==== FILL THESE IN — same values as your piggy bank ==== */
const SUPABASE_URL = 'PASTE_PROJECT_URL_HERE';
const SUPABASE_KEY = 'PASTE_ANON_KEY_HERE';
/* ======================================================== */

const KEY = 'saturday-chore-chart';

const STARTER_CHORES = [
  'Throw away all boxes in the house',
  'Take Xbox & table box upstairs and put in our room',
  'Clean up game room',
  "Move the extra TV so it doesn't get bumped if kids are playing at the party",
  'Fix the backyard rug & cushions',
  'Kids bedrooms clean',
  'Kids bathroom clean (parent helps with toilet & around toilet)',
  'Downstairs bathroom cleaned',
  "Fresh towels in all bathrooms + make sure there's toilet paper & wipes",
  'Put one booster seat in Scion & the other in the garage',
  'Downstairs picked up, vacuumed & mopped',
  'Case of water bottles by the front door → garage fridge',
  'Change downstairs bathroom light'
];

let chores = [];

/* ---- storage: Supabase (shared) with localStorage cache ---- */
const sbReady = () => SUPABASE_URL.startsWith('http') && SUPABASE_KEY.length > 20;
const sbHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const seed = () => STARTER_CHORES.map(t => ({ id: uid(), text: t, done: false }));

const store = {
  async load(){
    if (sbReady()){
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/family_apps?key=eq.${KEY}&select=value`, { headers: sbHeaders });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = await res.json();
        if (rows.length){
          try{ localStorage.setItem(KEY, JSON.stringify(rows[0].value)); }catch(e){}
          return rows[0].value;
        }
        // first ever load: seed the starter list and push it up
        const s = seed();
        await this.save(s);
        return s;
      }catch(e){ console.warn('Supabase load failed:', e); }
    }
    try{
      const raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    }catch(e){}
    return seed();
  },
  async save(data){
    try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){}
    if (sbReady()){
      try{
        await fetch(`${SUPABASE_URL}/rest/v1/family_apps`, {
          method: 'POST',
          headers: { ...sbHeaders, 'Prefer': 'resolution=merge-duplicates' },
          body: JSON.stringify({ key: KEY, value: data, updated_at: new Date().toISOString() })
        });
      }catch(e){ console.error('Supabase save failed:', e); }
    }
  }
};

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && sbReady()){
    chores = await store.load();
    render();
  }
});

/* ---- render ---- */
const $ = id => document.getElementById(id);
const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function render(){
  const done = chores.filter(c => c.done).length;
  const total = chores.length;
  const pct = total ? Math.round(done/total*100) : 0;
  $('countText').textContent = `${done} of ${total} done`;
  $('pctText').textContent = pct + '%';
  const fill = $('barFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('complete', pct === 100 && total > 0);
  $('allDone').classList.toggle('show', pct === 100 && total > 0);

  $('choreList').innerHTML = chores.map(c => `
<div class="chore ${c.done ? 'done' : ''}" onclick="toggle('${c.id}')">
      <div class="box">${c.done ? '✓' : ''}</div>
      <div class="text">${esc(c.text)}</div>
      <button class="del" onclick="event.stopPropagation(); delChore('${c.id}')" aria-label="Delete chore">✕</button>
    </div>`).join('');
}

async function toggle(id){
  const c = chores.find(x => x.id === id);
  if (!c) return;
  c.done = !c.done;
  render();
  await store.save(chores);
}
async function delChore(id){
  const c = chores.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`Remove "${c.text}"?`)) return;
  chores = chores.filter(x => x.id !== id);
  render();
  await store.save(chores);
}
async function resetAll(){
  if (!confirm('Uncheck everything?')) return;
  chores.forEach(c => c.done = false);
  render();
  await store.save(chores);
}
function openAddSheet(){
  $('choreText').value = '';
  $('addOverlay').classList.add('open');
  setTimeout(()=> $('choreText').focus(), 100);
}
async function saveChore(){
  const text = $('choreText').value.trim();
  if (!text){ $('choreText').focus(); return; }
  chores.push({ id: uid(), text, done: false });
  closeSheets();
  render();
  await store.save(chores);
}
function closeSheets(){
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
}
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeSheets(); });
});

(async () => { chores = await store.load(); render(); })();
</script>
</body>
</html>
